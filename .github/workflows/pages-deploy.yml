name: Deploy Pages

# Publishes the Reclaim validation landing page to GitHub Pages.
# Mirrors reflect's Actions-based Pages pipeline (build_type: workflow) rather than
# the legacy "Deploy from a branch" build, which was queuing/stalling. Custom domain
# (No-IP free, e.g. reclaim.sytes.net) is added via a CNAME file once the hostname
# exists in No-IP — same approach as reflect's reflects.sytes.net.
#
# This is a plain static site (single index.html), so we upload the repo root as-is
# instead of running Jekyll like reflect's docs/ build.

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One production deploy at a time; do NOT cancel an in-progress publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact (repo root)
        uses: actions/upload-pages-artifact@v5
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        with:
          # GitHub's Pages backend is intermittently slow to finish publishing;
          # 20 minutes rides out the slow window instead of failing a good build.
          timeout: 1200000
